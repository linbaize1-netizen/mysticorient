<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Orient</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .yin-yang {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 50%;
            position: relative;
        }
        .yin-yang::before, .yin-yang::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        .yin-yang::before {
            background: #000;
            top: 0;
            left: 0;
        }
        .yin-yang::after {
            background: #000;
            bottom: 0;
            right: 0;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #fff;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #ffb020;
            margin: 0 auto 30px;
        }
        .description {
            font-size: 16px;
            line-height: 1.6;
            color: #aaa;
            margin-bottom: 30px;
        }
        .checkbox-group {
            text-align: left;
            margin-bottom: 40px;
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }
        .checkbox-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .checkbox-item input {
            width: 20px;
            height: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: #ffb020;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="yin-yang"></div>
        <h1>进入前</h1>
        <div class="divider"></div>
        <div class="description">
            <p>Mystic Orient 提供 东方文化娱乐体验。</p>
            <br>
            <p>所有解读仅供 娱乐和自我反思之用，不构成任何形式的专业建议——包括医疗、法律、财务或心理方面的建议。</p>
            <br>
            <p>继续浏览即表示您已 年满 18 周岁，并同意我们的 <a href="legal.html" style="color:#ffb020;">服务条款</a> 和 <a href="legal.html" style="color:#ffb020;">隐私政策</a>。</p>
        </div>

        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="check1" checked>
                <label for="check1">我明白这是文化娱乐，不是专业建议。</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="check2" checked>
                <label for="check2">我确认本人已年满18周岁。</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="check3" checked>
                <label for="check3">我同意服务条款和隐私政策</label>
            </div>
        </div>

        <!-- 关键修改：这里的按钮是纯HTML跳转，没有任何JS逻辑，100%不会被阻止 -->
        <a href="part2.html" class="btn">我同意 · 进入神秘东方 →</a>

        <div class="footer">
            <p>仅供娱乐用途</p>
            <p>© 2026 MYSTIC ORIENT · 保留所有权利</p>
        </div>
    </div>
</body>
</html>
